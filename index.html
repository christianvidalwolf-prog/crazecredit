<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craze Credit - Gestión de Riesgos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons for premium feel -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="https://i.ibb.co/XxKXp5TJ/Captura-de-pantalla-2026-04-21-a-las-11-16-29.png" alt="Craze Credit" class="logo-img">
            <span>Craze Credit</span>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#" class="nav-link active" onclick="showModule('general')">
                    <i data-lucide="layout-dashboard"></i>
                    General
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" onclick="showModule('limits')">
                    <i data-lucide="shield-alert"></i>
                    Límites
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" onclick="showModule('risk')">
                    <i data-lucide="activity"></i>
                    Riesgos
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" onclick="showModule('commercial')">
                    <i data-lucide="bar-chart-3"></i>
                    Análisis
                </a>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="title-area">
                <h1 id="module-title-display">Dashboard de Riesgos</h1>
                <p id="current-date-display">21 de abril de 2026 · Live Data</p>
            </div>
            <div class="actions">
                <!-- Commercial Filter -->
                <select id="commercial-filter" onchange="applyFilters()" style="background: var(--bg-card); color: white; border: 1px solid var(--border); padding: 0.5rem; border-radius: 8px;">
                    <option value="all">Todos los Comerciales</option>
                </select>
            </div>
        </header>

        <section class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Balance Total</div>
                <div class="kpi-value" id="kpi-total-balance">0 €</div>
                <div class="kpi-trend up"><i data-lucide="trending-up"></i> 8.2% vs mes anterior</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Deuda Vencida</div>
                <div class="kpi-value" id="kpi-overdue-balance">0 €</div>
                <div class="kpi-trend down"><i data-lucide="trending-down"></i> 3.4% del total</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Crédito Asegurado</div>
                <div class="kpi-value" id="kpi-secured-credit">0 €</div>
                <div class="kpi-trend"><i data-lucide="check-circle"></i> Riesgo cubierto</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Vencimientos Próximos</div>
                <div class="kpi-value" id="kpi-upcoming-renewals">0</div>
                <div class="kpi-trend warning"><i data-lucide="alert-triangle"></i> Revisión necesaria</div>
            </div>
        </section>

        <div id="dynamic-content">
            <!-- Content will be injected here by app.js -->
        </div>
    </main>

    <!-- Data and Application Logic -->
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
